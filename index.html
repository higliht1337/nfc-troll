<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обновление системы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw; height: 100vh; background: #000;
            display: flex; align-items: center; justify-content: center;
            font-family: Arial, sans-serif; overflow: hidden;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
        }
        #overlay h1 { color: #0f0; font-size: 22px; text-align: center; margin-bottom: 15px; animation: blink 1s infinite; }
        #overlay p { color: #fff; font-size: 14px; text-align: center; margin-bottom: 10px; }
        .loader { width: 50px; height: 50px; border: 3px solid #333; border-top: 3px solid #0f0; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="overlay" onclick="attack()">
        <h1>ВНИМАНИЕ!</h1>
        <p>Обнаружена подозрительная активность.</p>
        <p>Нажмите для сканирования...</p>
        <div class="loader"></div>
    </div>

    <!-- ЗАМЕНИ stohn.mp3 НА ТОЧНОЕ ИМЯ ТВОЕГО ФАЙЛА -->
    <audio id="weapon" src="stohn.mp3" preload="auto" loop></audio>

    <script>
        function attack() {
            // Прячем оверлей
            var overlay = document.getElementById('overlay');
            if (overlay) overlay.style.display = 'none';

            // Вибрация
            try {
                if (window.navigator && window.navigator.vibrate) {
                    navigator.vibrate([3000]);
                }
            } catch(e) {}

            // Звук — просто .play(), без AudioContext
            var audio = document.getElementById('weapon');
            audio.volume = 1.0;
            audio.loop = true;
            audio.play().catch(function(e) {
                console.log("Ошибка:", e);
            });

            // Меняем фон
            document.body.style.background = '#f00';
            document.body.innerHTML += '<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:30px;text-align:center;z-index:9998;text-shadow:0 0 20px red;">⚠️ ВЗЛОМ ⚠️</div>';

            // Блокируем назад
            history.pushState(null, null, location.href);
            window.onpopstate = function() { history.pushState(null, null, location.href); };
        }
    </script>

</body>
</html>
